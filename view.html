<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fiber Map Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>

body{
margin:0;
}

#map{
height:100vh;
width:100%;
}

</style>
</head>

<body>

<div id="map"></div>

<script>

/* MAP */

let map=L.map("map").setView([9.75,124.25],9)

/* GOOGLE MAP LAYERS */

let street=L.tileLayer(
"https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}",
{
maxZoom:20,
subdomains:['mt0','mt1','mt2','mt3']
}
)

let satellite=L.tileLayer(
"https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
{
maxZoom:20,
subdomains:['mt0','mt1','mt2','mt3']
}
)

street.addTo(map)

L.control.layers(
{
Street:street,
Satellite:satellite
}).addTo(map)

/* CLUSTER ENGINE */

let cluster=L.markerClusterGroup({
chunkedLoading:true,
chunkInterval:200,
chunkDelay:50
})

map.addLayer(cluster)

/* ICONS */

function icon(color){
return L.icon({
iconUrl:
"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-"+color+".png",
shadowUrl:
"https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
})
}

const icons={
house:icon("green"),
nap:icon("red")
}

/* SHOW COORDINATES */

map.on("contextmenu",function(e){

let lat=e.latlng.lat.toFixed(6)
let lng=e.latlng.lng.toFixed(6)

L.popup()
.setLatLng(e.latlng)
.setContent(
"Lat: "+lat+"<br>Lng: "+lng
)
.openOn(map)

})

/* LOAD DATA */

fetch("data.json")
.then(res=>res.json())
.then(data=>{

let group=[]

/* HOUSE PINS */

data.pins.forEach(p=>{

let marker=L.marker(
[p.lat,p.lng],
{icon:icons.house}
)

cluster.addLayer(marker)

group.push(marker)

})

/* NAP PINS */

data.naps.forEach(n=>{

let marker=L.marker(
[n.lat,n.lng],
{icon:icons.nap}
)

cluster.addLayer(marker)

L.circle(
[n.lat,n.lng],
{
radius:n.radius,
color:"red"
}
).addTo(map)

group.push(marker)

})

/* AUTO ZOOM */

if(group.length){

let g=L.featureGroup(group)

map.fitBounds(g.getBounds())

}

})

</script>

</body>
</html>
