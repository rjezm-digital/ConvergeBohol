<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fiber Map Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0}
#map{height:100vh;width:100%}
</style>
</head>

<body>

<div id="map"></div>

<script>

let map=L.map("map").setView([9.75,124.25],9)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

function icon(color){
return L.icon({
iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
shadowUrl:"https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
})
}

const icons={
house:icon("green"),
nap:icon("red")
}

const params=new URLSearchParams(location.search)

if(params.get("data")){

let decoded=JSON.parse(atob(params.get("data")))

let group=[]

decoded.pins.forEach(p=>{
let m=L.marker([p.lat,p.lng],{icon:icons.house}).addTo(map)
group.push(m)
})

decoded.naps.forEach(n=>{
let m=L.marker([n.lat,n.lng],{icon:icons.nap}).addTo(map)
L.circle([n.lat,n.lng],{radius:n.radius,color:"red"}).addTo(map)
group.push(m)
})

if(group.length){
let g=L.featureGroup(group)
map.fitBounds(g.getBounds())
}

}

</script>

</body>
</html>
