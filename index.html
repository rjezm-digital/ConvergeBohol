<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Fiber Planner</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

#sidebar{
width:320px;
background:#0f172a;
color:white;
padding:12px;
overflow:auto;
}

#map{
flex:1;
}

button{
width:100%;
padding:8px;
margin:4px 0;
background:#0284c7;
color:white;
border:none;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin-bottom:6px;
}

#footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
color:#94a3b8;
text-align:center;
font-size:12px;
padding:6px;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Fiber Planner</h3>

<input type="file" id="fileInput" accept=".xlsx,.xls,.kmz">

<button onclick="addNAP()">Add NAP</button>
<button onclick="showHeatmap()">Heatmap</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportKML()">Export KML</button>
<button onclick="clearMap()">Clear Map</button>

<hr>

<div id="napStats"></div>

</div>

<div id="map"></div>

<footer id="footer">
Fiber Planner • By Randy Tadlas
</footer>

<script>

/* MAP */

let map=L.map("map").setView([9.75,124.25],9)

/* GOOGLE MAP */

let street=L.tileLayer(
"https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}",
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
).addTo(map)

let satellite=L.tileLayer(
"https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
)

let hybrid=L.tileLayer(
"https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
)

L.control.layers({
Street:street,
Satellite:satellite,
Hybrid:hybrid
}).addTo(map)

/* CLUSTER */

let cluster=L.markerClusterGroup({
chunkedLoading:true,
spiderfyOnMaxZoom:true
})

map.addLayer(cluster)

/* ICONS */

function icon(color){
return L.icon({
iconUrl:
"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-"+color+".png",
shadowUrl:
"https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[30,45],
iconAnchor:[15,45]
})
}

const icons={
house:icon("green"),
nap:icon("red")
}

/* DATA */

let pins=[]
let naps=[]

/* DUPLICATE CHECK */

function pinExists(lat,lng){
return pins.some(p=>p.lat===lat && p.lng===lng)
}

/* RIGHT CLICK ADD HOUSE */

map.on("contextmenu",function(e){

let lat=e.latlng.lat
let lng=e.latlng.lng

if(pinExists(lat,lng)) return

let marker=L.marker([lat,lng],{icon:icons.house})

marker.bindPopup(`
<b>House</b><br>
${lat},${lng}
`)

cluster.addLayer(marker)

pins.push({
name:"House",
lat:lat,
lng:lng
})

save()
updateNAP()

})

/* ADD NAP */

function addNAP(){

map.once("click",function(e){

let lat=e.latlng.lat
let lng=e.latlng.lng

let marker=L.marker([lat,lng],{icon:icons.nap})

marker.bindPopup("<b>NAP</b>")

cluster.addLayer(marker)

L.circle([lat,lng],{
radius:200,
color:"red",
interactive:false
}).addTo(map)

naps.push({
name:"NAP",
lat:lat,
lng:lng,
radius:200,
capacity:16
})

save()
updateNAP()

})

}

/* KMZ + EXCEL IMPORT */

document.getElementById("fileInput").addEventListener("change",async function(e){

let file=e.target.files[0]

if(!file) return

/* KMZ */

if(file.name.endsWith(".kmz")){

let zip=await JSZip.loadAsync(file)

let kml

zip.forEach((p,e)=>{
if(p.endsWith(".kml")) kml=e
})

let text=await kml.async("text")

let xml=new DOMParser().parseFromString(text,"text/xml")

let pm=xml.getElementsByTagName("Placemark")

for(let p of pm){

let name=p.getElementsByTagName("name")[0]?.textContent || "House"

let coord=p.getElementsByTagName("coordinates")[0]?.textContent

if(!coord) continue

let [lng,lat]=coord.trim().split(",")

lat=parseFloat(lat)
lng=parseFloat(lng)

if(pinExists(lat,lng)) continue

let marker=L.marker([lat,lng],{icon:icons.house})

marker.bindPopup(`<b>${name}</b>`)

cluster.addLayer(marker)

pins.push({
name:name,
lat:lat,
lng:lng
})

}

}

/* EXCEL */

if(file.name.endsWith(".xlsx") || file.name.endsWith(".xls")){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let wb=XLSX.read(data,{type:"array"})

let sheet=wb.Sheets[wb.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let lat=parseFloat(r.lat || r.latitude)
let lng=parseFloat(r.lng || r.longitude)

let name=r.name || "House"

if(isNaN(lat) || isNaN(lng)) return

if(pinExists(lat,lng)) return

let marker=L.marker([lat,lng],{icon:icons.house})

marker.bindPopup(`<b>${name}</b>`)

cluster.addLayer(marker)

pins.push({
name:name,
lat:lat,
lng:lng
})

})

}

reader.readAsArrayBuffer(file)

}

save()
updateNAP()

})

/* HEATMAP */

function showHeatmap(){

let heat=[]

pins.forEach(p=>{
heat.push([p.lat,p.lng,1])
})

L.heatLayer(heat,{
radius:40,
blur:25
}).addTo(map)

}

/* NAP CAPACITY */

function updateNAP(){

let html=""

naps.forEach(n=>{

let count=0

pins.forEach(p=>{
if(map.distance([n.lat,n.lng],[p.lat,p.lng])<=n.radius)
count++
})

html+=`NAP ${count}/${n.capacity}<br>`

})

document.getElementById("napStats").innerHTML=html

}

/* SAVE */

function save(){
localStorage.setItem("fiberplanner",JSON.stringify({pins,naps}))
}

/* LOAD */

function load(){

let data=localStorage.getItem("fiberplanner")

if(!data) return

let decoded=JSON.parse(data)

decoded.pins.forEach(p=>{

let marker=L.marker([p.lat,p.lng],{icon:icons.house})

marker.bindPopup(`<b>${p.name}</b>`)

cluster.addLayer(marker)

pins.push(p)

})

decoded.naps.forEach(n=>{

let marker=L.marker([n.lat,n.lng],{icon:icons.nap})

cluster.addLayer(marker)

L.circle([n.lat,n.lng],{
radius:n.radius,
color:"red",
interactive:false
}).addTo(map)

naps.push(n)

})

updateNAP()

}

load()

/* EXPORT JSON */

function exportJSON(){

let blob=new Blob(
[JSON.stringify({pins,naps},null,2)],
{type:"application/json"}
)

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="data.json"

a.click()

}

/* EXPORT KML */

function exportKML(){

let kml='<?xml version="1.0"?><kml><Document>'

pins.forEach(p=>{
kml+=`
<Placemark>
<name>${p.name}</name>
<Point>
<coordinates>${p.lng},${p.lat}</coordinates>
</Point>
</Placemark>
`
})

kml+='</Document></kml>'

let blob=new Blob([kml],{type:"text/xml"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="fiber-map.kml"

a.click()

}

/* CLEAR */

function clearMap(){

localStorage.removeItem("fiberplanner")

location.reload()

}

</script>

</body>
</html>
