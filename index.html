<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fiber Planner Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>

body{margin:0;display:flex;height:100vh;font-family:Arial}

#sidebar{
width:320px;
background:#0f172a;
color:white;
padding:10px;
overflow:auto
}

#map{flex:1}

button{width:100%;padding:8px;margin:4px 0;background:#0284c7;color:white;border:none}

input,select{width:100%;padding:8px;margin-bottom:6px}

.pin{border-bottom:1px solid #334155;padding:5px}

</style>

</head>

<body>

<div id="sidebar">

<h3>Fiber Planner</h3>

<input type="file" id="fileInput" accept=".xlsx,.xls,.kmz,.kml">

<button onclick="exportKML()">Export KML</button>

<button onclick="clearAll()">Clear All</button>

<hr>

<select id="basemap">
<option value="street">Street</option>
<option value="satellite">Satellite</option>
</select>

<hr>

<button onclick="drawFiber()">Draw Fiber Route</button>

<button onclick="addCoverage()">Add NAP Coverage</button>

<hr>

<input id="search" placeholder="Search pin">

<div id="pinList"></div>

</div>

<div id="map"></div>

<script>

/* ---------------- MAP ---------------- */

let map=L.map("map",{
preferCanvas:true,
zoomAnimation:false
}).setView([9.75,124.25],9)

let street=L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
)

let satellite=L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
)

street.addTo(map)

document.getElementById("basemap").onchange=function(){

if(this.value==="satellite"){
map.removeLayer(street)
satellite.addTo(map)
}else{
map.removeLayer(satellite)
street.addTo(map)
}

}

/* ------------ CLUSTER ------------ */

let cluster=L.markerClusterGroup({
chunkedLoading:true
})

map.addLayer(cluster)

/* ------------ ROUTES ------------ */

let routeLayer=L.featureGroup().addTo(map)

/* ------------ DATA ------------ */

let pins=[]

/* -------- STORAGE -------- */

let db

let req=indexedDB.open("FiberPlannerDB",1)

req.onupgradeneeded=e=>{
db=e.target.result
db.createObjectStore("pins",{keyPath:"id",autoIncrement:true})
}

req.onsuccess=e=>{
db=e.target.result
loadPins()
}

/* ---------- SAVE ---------- */

function savePins(){

let tx=db.transaction("pins","readwrite")

let store=tx.objectStore("pins")

store.clear()

pins.forEach(p=>{
store.add(p)
})

}

/* ---------- LOAD ---------- */

function loadPins(){

let tx=db.transaction("pins","readonly")

let store=tx.objectStore("pins")

store.getAll().onsuccess=e=>{

let data=e.target.result

data.forEach(p=>{
createPin(p.name,p.lat,p.lng,false)
})

}

}

/* ---------- ADD PIN ---------- */

function createPin(name,lat,lng,save=true){

let marker=L.marker([lat,lng])

marker.bindPopup(`<b>${name}</b><br>${lat},${lng}`)

marker.on("contextmenu",()=>{

if(confirm("Delete pin?")){

cluster.removeLayer(marker)

pins=pins.filter(p=>p.marker!==marker)

savePins()

renderPins()

}

})

cluster.addLayer(marker)

pins.push({name,lat,lng,marker})

if(save) savePins()

renderPins()

}

/* -------- RENDER -------- */

function renderPins(){

let list=document.getElementById("pinList")

list.innerHTML=""

pins.slice(0,200).forEach((p,i)=>{

let div=document.createElement("div")

div.className="pin"

div.innerHTML=`
<b>${p.name}</b><br>
${p.lat},${p.lng}
<button onclick="zoomPin(${i})">Zoom</button>
`

list.appendChild(div)

})

}

/* -------- ZOOM -------- */

function zoomPin(i){

let p=pins[i]

map.setView([p.lat,p.lng],16)

p.marker.openPopup()

}

/* -------- DRAW ROUTE -------- */

let drawControl=new L.Control.Draw({
draw:{
polyline:true,
polygon:false,
rectangle:false,
circle:false,
marker:false
},
edit:{
featureGroup:routeLayer
}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){

let layer=e.layer

routeLayer.addLayer(layer)

let latlngs=layer.getLatLngs()

let distance=0

for(let i=1;i<latlngs.length;i++){

distance+=latlngs[i-1].distanceTo(latlngs[i])

}

distance=(distance/1000).toFixed(2)

layer.bindPopup("Fiber length: "+distance+" km").openPopup()

})

/* -------- COVERAGE -------- */

function addCoverage(){

map.once("click",e=>{

L.circle(e.latlng,{
radius:200,
color:"green"
}).addTo(map)

})

}

/* -------- IMPORT -------- */

document.getElementById("fileInput").addEventListener("change",async e=>{

let file=e.target.files[0]

if(!file) return

if(file.name.endsWith(".xlsx")||file.name.endsWith(".xls"))
parseExcel(file)

else if(file.name.endsWith(".kmz"))
parseKMZ(file)

else if(file.name.endsWith(".kml"))
parseKML(await file.text())

})

/* -------- EXCEL -------- */

function parseExcel(file){

let reader=new FileReader()

reader.onload=e=>{

let data=new Uint8Array(e.target.result)

let wb=XLSX.read(data,{type:"array"})

let sheet=wb.Sheets[wb.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let name=r.name||r.Name||"Pin"

let lat=parseFloat(r.latitude||r.lat||r.Lat)

let lng=parseFloat(r.longitude||r.lng||r.Lng)

createPin(name,lat,lng,false)

})

savePins()

}

reader.readAsArrayBuffer(file)

}

/* -------- KMZ -------- */

async function parseKMZ(file){

let zip=await JSZip.loadAsync(file)

let kml=null

zip.forEach((p,e)=>{
if(p.endsWith(".kml")) kml=e
})

let text=await kml.async("text")

parseKML(text)

}

/* -------- KML -------- */

function parseKML(text){

let xml=new DOMParser().parseFromString(text,"text/xml")

let pm=xml.getElementsByTagName("Placemark")

for(let p of pm){

let name=p.getElementsByTagName("name")[0]?.textContent||"Pin"

let coord=p.getElementsByTagName("coordinates")[0]?.textContent

if(!coord) continue

let [lng,lat]=coord.trim().split(",")

createPin(name,parseFloat(lat),parseFloat(lng),false)

}

savePins()

}

/* -------- EXPORT -------- */

function exportKML(){

let kml='<?xml version="1.0"?><kml><Document>'

pins.forEach(p=>{

kml+=`
<Placemark>
<name>${p.name}</name>
<Point>
<coordinates>${p.lng},${p.lat},0</coordinates>
</Point>
</Placemark>
`

})

kml+='</Document></kml>'

let blob=new Blob([kml],{type:"text/xml"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="fiber-planner.kml"

a.click()

}

/* -------- RIGHT CLICK -------- */

map.on("contextmenu",e=>{

let name=prompt("Pin name")

if(!name) return

createPin(name,e.latlng.lat,e.latlng.lng)

})

</script>

</body>
</html>
