<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fiber Planner</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

#sidebar{
width:340px;
background:#0f172a;
color:white;
padding:10px;
overflow:auto;
}

#map{
flex:1;
padding-bottom:28px;
}

button{
width:100%;
padding:8px;
margin:4px 0;
background:#0284c7;
color:white;
border:none;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin-bottom:6px;
}

/* Footer */

#footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
color:#94a3b8;
text-align:center;
font-size:12px;
padding:6px;
border-top:1px solid #334155;
z-index:999;
}

</style>
</head>

<body>

<div id="sidebar">

<h3>Fiber Planner</h3>

<button onclick="generateShare()">Generate Share Link</button>

<button onclick="addNAP()">Add NAP</button>

<button onclick="addHouse()">Add House</button>

<button onclick="exportKML()">Export KML</button>

<hr>

<input id="shareLink" placeholder="Share link will appear here">

</div>

<div id="map"></div>

<footer id="footer">
Fiber Planner • By Randy Tadlas
</footer>

<script>

/* ---------------- VIEWER MODE ---------------- */

const params = new URLSearchParams(window.location.search)
const viewer = params.get("viewer") === "1"

/* ---------------- MAP ---------------- */

let map = L.map("map").setView([9.75,124.25],9)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

/* ---------------- ICONS ---------------- */

function icon(color){

return L.icon({
iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
shadowUrl:"https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
})

}

const icons={
NAP:icon("red"),
House:icon("green")
}

/* ---------------- DATA ---------------- */

let pins=[]
let naps=[]

/* ---------------- ADD HOUSE ---------------- */

function addHouse(){

if(viewer) return

map.once("click",e=>{

let marker = L.marker(e.latlng,{icon:icons.House}).addTo(map)

pins.push({
type:"house",
lat:e.latlng.lat,
lng:e.latlng.lng
})

})

}

/* ---------------- ADD NAP ---------------- */

function addNAP(){

if(viewer) return

map.once("click",e=>{

let marker = L.marker(e.latlng,{icon:icons.NAP}).addTo(map)

let circle = L.circle(e.latlng,{
radius:200,
color:"red"
}).addTo(map)

naps.push({
type:"nap",
lat:e.latlng.lat,
lng:e.latlng.lng,
radius:200
})

})

}

/* ---------------- SHARE LINK ---------------- */

function generateShare(){

let data={
pins:pins,
naps:naps
}

let encoded = btoa(JSON.stringify(data))

let url =
location.origin +
location.pathname +
"?viewer=1&data=" +
encoded

document.getElementById("shareLink").value=url

}

/* ---------------- LOAD SHARED MAP ---------------- */

if(params.get("data")){

let decoded = JSON.parse(atob(params.get("data")))

decoded.pins.forEach(p=>{
L.marker([p.lat,p.lng],{icon:icons.House}).addTo(map)
})

decoded.naps.forEach(n=>{
L.marker([n.lat,n.lng],{icon:icons.NAP}).addTo(map)
L.circle([n.lat,n.lng],{radius:n.radius,color:"red"}).addTo(map)
})

}

/* ---------------- EXPORT KML ---------------- */

function exportKML(){

let kml='<?xml version="1.0"?><kml><Document>'

pins.forEach(p=>{
kml+=`
<Placemark>
<Point>
<coordinates>${p.lng},${p.lat}</coordinates>
</Point>
</Placemark>`
})

kml+='</Document></kml>'

let blob=new Blob([kml],{type:"text/xml"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="fiber-map.kml"

a.click()

}

</script>

</body>
</html>
