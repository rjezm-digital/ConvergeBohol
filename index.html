<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Fiber Planner</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

#sidebar{
width:320px;
background:#0f172a;
color:white;
padding:12px;
overflow:auto;
}

#map{
flex:1;
}

button{
width:100%;
padding:8px;
margin:4px 0;
background:#0284c7;
color:white;
border:none;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin-bottom:6px;
}

#footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
color:#94a3b8;
text-align:center;
font-size:12px;
padding:6px;
}

.warning{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div id="sidebar">

<h3>Fiber Planner</h3>

<input id="coordSearch" placeholder="lat,lng">
<button onclick="gotoCoord()">Go</button>

<input type="file" id="fileInput" accept=".xlsx,.xls,.kmz">

<button onclick="addNAP()">Add NAP</button>
<button onclick="showNAPHeatmap()">Show Heatmap</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportKML()">Export KML</button>
<button onclick="clearMap()">Clear Map</button>

<hr>

<div id="napStats"></div>

</div>

<div id="map"></div>

<footer id="footer">
Fiber Planner • By Randy Tadlas
</footer>

<script>

/* STORAGE */

const STORAGE="fiberplanner"

/* MAP */

let map=L.map("map").setView([9.75,124.25],9)

/* GOOGLE MAP */

let street=L.tileLayer(
"https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}",
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
)

let satellite=L.tileLayer(
"https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
)

let hybrid=L.tileLayer(
"https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
)

street.addTo(map)

L.control.layers({
Street:street,
Satellite:satellite,
Hybrid:hybrid
}).addTo(map)

/* CLUSTER ENGINE */

let cluster=L.markerClusterGroup({
chunkedLoading:true
})

map.addLayer(cluster)

/* DRAW TOOL */

let drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

let drawControl=new L.Control.Draw({
edit:{featureGroup:drawnItems},
draw:{
polygon:false,
circle:false,
marker:false
}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){
drawnItems.addLayer(e.layer)
})

/* ICONS */

function icon(color){
return L.icon({
iconUrl:
"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-"+color+".png",
shadowUrl:
"https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
})
}

const icons={
house:icon("green"),
nap:icon("red")
}

/* DATA */

let pins=[]
let naps=[]

/* DUPLICATE CHECK */

function pinExists(lat,lng){
return pins.some(p=>p.lat===lat && p.lng===lng)
}

/* SEARCH COORDINATE */

function gotoCoord(){

let val=document.getElementById("coordSearch").value.split(",")

let lat=parseFloat(val[0])
let lng=parseFloat(val[1])

map.setView([lat,lng],18)

L.marker([lat,lng]).addTo(map)

}

/* RIGHT CLICK ADD HOUSE */

map.on("contextmenu",function(e){

let lat=e.latlng.lat
let lng=e.latlng.lng

if(pinExists(lat,lng)) return

let marker=L.marker([lat,lng],{icon:icons.house})

cluster.addLayer(marker)

pins.push({
name:"House",
lat:lat,
lng:lng
})

save()
updateNAP()

})

/* ADD NAP */

function addNAP(){

map.once("click",function(e){

let lat=e.latlng.lat
let lng=e.latlng.lng

let marker=L.marker([lat,lng],{icon:icons.nap})

cluster.addLayer(marker)

L.circle([lat,lng],{
radius:200,
color:"red"
}).addTo(map)

naps.push({
name:"NAP",
lat:lat,
lng:lng,
radius:200,
capacity:16
})

save()
updateNAP()

})

}

/* NAP CAPACITY */

function updateNAP(){

let html=""

naps.forEach(n=>{

let count=0

pins.forEach(p=>{
if(map.distance([n.lat,n.lng],[p.lat,p.lng])<=n.radius) count++
})

let percent=Math.round(count/n.capacity*100)

let warn=count>=n.capacity
? "<span class='warning'>FULL</span>"
: ""

html+=`NAP ${count}/${n.capacity} (${percent}%) ${warn}<br>`

})

document.getElementById("napStats").innerHTML=html

}

/* HEATMAP */

function showNAPHeatmap(){

let heat=[]

pins.forEach(p=>{
heat.push([p.lat,p.lng,1])
})

L.heatLayer(heat,{
radius:40,
blur:25
}).addTo(map)

}

/* SAVE */

function save(){
localStorage.setItem(STORAGE,JSON.stringify({pins,naps}))
}

/* LOAD */

function load(){

let data=localStorage.getItem(STORAGE)

if(!data) return

let decoded=JSON.parse(data)

decoded.pins.forEach(p=>{

let m=L.marker([p.lat,p.lng],{icon:icons.house})
cluster.addLayer(m)

pins.push(p)

})

decoded.naps.forEach(n=>{

let m=L.marker([n.lat,n.lng],{icon:icons.nap})
cluster.addLayer(m)

L.circle([n.lat,n.lng],{
radius:n.radius,
color:"red"
}).addTo(map)

naps.push(n)

})

updateNAP()

}

load()

/* EXPORT JSON */

function exportJSON(){

let data={pins,naps}

let blob=new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
)

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="data.json"
a.click()

}

/* EXPORT KML */

function exportKML(){

let kml='<?xml version="1.0"?><kml><Document>'

pins.forEach(p=>{
kml+=`<Placemark>
<name>${p.name}</name>
<Point>
<coordinates>${p.lng},${p.lat}</coordinates>
</Point>
</Placemark>`
})

kml+='</Document></kml>'

let blob=new Blob([kml],{type:"text/xml"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="fiber-map.kml"
a.click()

}

/* CLEAR */

function clearMap(){
localStorage.removeItem(STORAGE)
location.reload()
}

/* FILE IMPORT */

document.getElementById("fileInput").addEventListener("change",async function(e){

let file=e.target.files[0]
if(!file) return

/* KMZ */

if(file.name.endsWith(".kmz")){

let zip=await JSZip.loadAsync(file)

let kml

zip.forEach((p,e)=>{
if(p.endsWith(".kml")) kml=e
})

let text=await kml.async("text")

let xml=new DOMParser().parseFromString(text,"text/xml")

let pm=xml.getElementsByTagName("Placemark")

for(let p of pm){

let name=p.getElementsByTagName("name")[0]?.textContent || "House"

let coord=p.getElementsByTagName("coordinates")[0]?.textContent

if(!coord) continue

let [lng,lat]=coord.trim().split(",")

lat=parseFloat(lat)
lng=parseFloat(lng)

if(pinExists(lat,lng)) continue

let m=L.marker([lat,lng],{icon:icons.house})

cluster.addLayer(m)

pins.push({
name:name,
lat:lat,
lng:lng
})

}

save()
updateNAP()

}

})

</script>

</body>
</html>
