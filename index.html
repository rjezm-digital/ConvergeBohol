<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fiber Planner Advanced</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/supercluster@8.0.1/dist/supercluster.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<style>
body{margin:0;display:flex;height:100vh;font-family:Arial}
#sidebar{width:320px;background:#0f172a;color:white;padding:10px;overflow:auto}
#map{flex:1}
button{width:100%;padding:8px;margin:4px 0;background:#0284c7;color:white;border:none}
input{width:100%;padding:8px;margin-bottom:6px}
</style>

</head>

<body>

<div id="sidebar">

<h3>Fiber Planner Advanced</h3>

<input type="file" id="fileInput" accept=".xlsx,.xls,.kmz,.kml">

<button onclick="enableRoute()">Auto Fiber Route</button>

<button onclick="addCoverage()">NAP Coverage (200m)</button>

<button onclick="exportKML()">Export KML</button>

</div>

<div id="map"></div>

<script>

/* MAP */

let map=L.map("map",{preferCanvas:true}).setView([9.75,124.25],9)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

/* ICONS */

function icon(color){
return L.icon({
iconUrl:`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
shadowUrl:"https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41]
})
}

const icons={
NAP:icon("red"),
CRA:icon("yellow"),
Backbone:icon("blue"),
Manual:icon("green")
}

/* DATA */

let pins=[]
let markers=[]

/* SUPERCLUSTER */

let clusterIndex = new Supercluster({
radius:60,
maxZoom:20
})

function refreshClusters(){

let geo=pins.map(p=>({
type:"Feature",
geometry:{type:"Point",coordinates:[p.lng,p.lat]},
properties:p
}))

clusterIndex.load(geo)

renderClusters()

}

function renderClusters(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

let bounds=map.getBounds()

let clusters=clusterIndex.getClusters([
bounds.getWest(),
bounds.getSouth(),
bounds.getEast(),
bounds.getNorth()
], map.getZoom())

clusters.forEach(c=>{

let [lng,lat]=c.geometry.coordinates

if(c.properties.cluster){

let marker=L.marker([lat,lng]).addTo(map)

marker.bindPopup("Cluster: "+c.properties.point_count)

markers.push(marker)

}else{

let iconType=c.properties.layer||"Manual"

let marker=L.marker([lat,lng],{icon:icons[iconType]}).addTo(map)

marker.bindPopup(c.properties.name)

markers.push(marker)

}

})

}

map.on("moveend",renderClusters)

/* ADD PIN */

function addPin(layer,name,lat,lng){

pins.push({layer,name,lat,lng})

refreshClusters()

}

/* COVERAGE */

function addCoverage(){

map.once("click",e=>{

L.circle(e.latlng,{
radius:200,
color:"green"
}).addTo(map)

})

}

/* AUTO ROUTE */

let routePoints=[]

function enableRoute(){

routePoints=[]

alert("Click start and end point")

map.once("click",start=>{
routePoints.push(start.latlng)

map.once("click",end=>{
routePoints.push(end.latlng)

let url=`https://router.project-osrm.org/route/v1/driving/${routePoints[0].lng},${routePoints[0].lat};${routePoints[1].lng},${routePoints[1].lat}?overview=full&geometries=geojson`

fetch(url)
.then(r=>r.json())
.then(data=>{

let route=data.routes[0].geometry

L.geoJSON(route,{color:"orange"}).addTo(map)

let dist=(data.routes[0].distance/1000).toFixed(2)

alert("Fiber distance: "+dist+" km")

})

})

})

}

/* KMZ / EXCEL IMPORT */

document.getElementById("fileInput").addEventListener("change",async e=>{

let file=e.target.files[0]

if(!file) return

if(file.name.endsWith(".xlsx")||file.name.endsWith(".xls")){

let reader=new FileReader()

reader.onload=e=>{

let wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"})

let sheet=wb.Sheets[wb.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{
addPin("NAP",r.name||"Pin",parseFloat(r.lat),parseFloat(r.lng))
})

}

reader.readAsArrayBuffer(file)

}

if(file.name.endsWith(".kmz")){

let zip=await JSZip.loadAsync(file)

let kml

zip.forEach((p,e)=>{if(p.endsWith(".kml"))kml=e})

let text=await kml.async("text")

let xml=new DOMParser().parseFromString(text,"text/xml")

let pm=xml.getElementsByTagName("Placemark")

for(let p of pm){

let name=p.getElementsByTagName("name")[0]?.textContent||"Pin"

let coord=p.getElementsByTagName("coordinates")[0]?.textContent

let [lng,lat]=coord.trim().split(",")

addPin("NAP",name,parseFloat(lat),parseFloat(lng))

}

}

})

/* EXPORT */

function exportKML(){

let kml='<?xml version="1.0"?><kml><Document>'

pins.forEach(p=>{
kml+=`
<Placemark>
<name>${p.name}</name>
<Point>
<coordinates>${p.lng},${p.lat},0</coordinates>
</Point>
</Placemark>`
})

kml+='</Document></kml>'

let blob=new Blob([kml],{type:"text/xml"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="fiber-map.kml"

a.click()

}

</script>

</body>
</html>
